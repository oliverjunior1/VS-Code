<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro Javascript</title>
</head>
<body>
    <h1>Teste com Javascript</h1>
    <script>
        let nome = "Olive";
        let idade = 25;

        function apresentarUsuario(nome, idade) {
            return `Olá, ${nome}. Você tem ${idade} anos.`;
        }

        let mensagem = apresentarUsuario(nome, idade);

        console.log(mensagem);
    </script>
</body>
</html>
